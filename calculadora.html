    <nav class="menu-principal">
      <div class="menu-container">
        <a href="index.html" class="logo"> Trote 2026 </a>

    <main class="principal">
      <section class="prova">
        <h3>🧮 Calculadora de Pontos</h3>

        <label> Pacotes de Arroz (5kg): </label>
        <input type="number" id="arroz" value="0" min="0" /> <br /><br />

        <label> Pacotes de Feijão (2kg): </label>
        <input type="number" id="feijao" value="0" min="0" /> <br /><br />

        <label> Óleo de Soja (unidades): </label>
        <input type="number" id="oleo" value="0" min="0" /> <br /><br />

        <label> Pacotes de Macarrão (500g): </label>
        <input type="number" id="macarrao" value="0" min="0" /> <br /><br />

        <button onclick="calcularPontos()">Calcular</button>
        <p id="resultado"></p>
      </section>
    </main>
     <footer class="rodape">
      <p>Coordenação Trote Solidário 2026: trotesolidario@facef.br</p>
